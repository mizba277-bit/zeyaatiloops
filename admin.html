<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --gold: #bf9b30;
            --gold-dark: #8c6f1f;
            --gold-light: #fdfaf0;
            --dark: #1a1a1a;
            --gray: #636e72;
            --white: #ffffff;
            --red: #eb4d4b;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; color: var(--dark); overflow-x: hidden; }
        
        /* --- Login Overlay --- */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 10000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: var(--white); width: 100%; max-width: 380px; padding: 40px 30px;
            border-radius: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 6px solid var(--gold);
        }

        /* --- Main Layout --- */
        .admin-header { background: var(--dark); color: var(--white); padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .admin-header h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .container { max-width: 800px; margin: -30px auto 50px auto; padding: 0 20px; }

        .card { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: var(--shadow); margin-bottom: 30px; border: 1px solid rgba(0,0,0,0.03); }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .input-group { margin-bottom: 20px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--gray); margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; background: #fcfcfc; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: #fff; outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: white; }
        .btn-orange { background: #ff9f43; color: white; }
        .btn-red { background: #fff1f1; color: var(--red); width: auto; padding: 8px 15px; font-size: 0.75rem; border-radius: 8px; }
        .btn-red:hover { background: var(--red); color: white; }

        /* List Styling */
        .item-row { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #f0f0f0; }
        .item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .cat-tag { background: var(--gold-light); color: var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin: 20px 0 10px; display: inline-block; }
        
        .status-msg { display: none; text-align: center; font-size: 0.8rem; color: var(--gold); font-weight: 600; margin-top: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {opacity: 0.6;} 50% {opacity: 1;} 100% {opacity: 0.6;} }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <div style="color: var(--gold); font-size: 3rem; margin-bottom: 15px;"><i class="fas fa-user-shield"></i></div>
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 5px;">Admin Login</h2>
        <p style="color: #666; font-size: 0.8rem; margin-bottom: 25px;">Enter password to manage your jewellery store.</p>
        <input type="password" id="adminPassInput" placeholder="••••••••" style="text-align: center; letter-spacing: 4px;">
        <button class="btn btn-gold" style="margin-top: 10px;" onclick="validateLogin()">Unlock Access</button>
        <div id="loginError" style="color: var(--red); font-size: 0.8rem; margin-top: 15px; display: none;">Invalid Password!</div>
    </div>
</div>

<div class="admin-header">
    <h1>Zeyaati Loops Manager</h1>
</div>

<div class="container">
    <div class="card">
        <div class="card-title"><i class="fas fa-palette"></i> Shop Branding</div>
        <label>Upload Store Logo (PNG)</label>
        <input type="file" id="logoFile" accept="image/*">
        <button class="btn btn-gold" style="margin-top:15px" onclick="uploadLogo()">Update Logo</button>
        <div id="logoStatus" class="status-msg">Updating Branding...</div>
    </div>

    <div class="card" style="border-left: 8px solid #ff9f43;">
        <div class="card-title" style="color: #ff9f43;"><i class="fas fa-fire"></i> Trending Styles Slider</div>
        <div class="input-group"><input type="text" id="trendName" placeholder="Trending Item Name"></div>
        <div class="input-group"><input type="number" id="trendPrice" placeholder="Price (₹)"></div>
        <div class="input-group">
            <label>Trending Image</label>
            <input type="file" id="trendFile" accept="image/*">
        </div>
        <button class="btn btn-orange" id="trendBtn" onclick="addItem('popular')">Add to Slider</button>
        <div id="trendStatus" class="status-msg">Syncing with Homepage...</div>
        <div id="trending-items-display" style="margin-top:20px"></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-gem"></i> Full Collection</div>
        <div class="input-group"><input type="text" id="itemName" placeholder="Product Name"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="number" id="itemPrice" placeholder="Price (₹)">
            <input type="text" id="itemCat" placeholder="Category (e.g. 01_Necklaces)">
        </div>
        <div class="input-group" style="margin-top:15px">
            <label>Product Image</label>
            <input type="file" id="itemFile" accept="image/*">
        </div>
        <button class="btn btn-gold" id="itemBtn" onclick="addItem('menu')">Add to Collection</button>
        <div id="itemStatus" class="status-msg">Adding Product...</div>
        <div id="menu-items-display" style="margin-top:20px"></div>
    </div>
</div>

<script>
    // --- AUTH LOGIC ---
    const CORRECT_PASSWORD = "jewel@123"; 
    function validateLogin() {
        const input = document.getElementById('adminPassInput').value;
        if (input === CORRECT_PASSWORD) {
            document.getElementById('loginOverlay').style.opacity = "0";
            setTimeout(() => document.getElementById('loginOverlay').style.display = "none", 500);
        } else {
            document.getElementById('loginError').style.display = "block";
            document.getElementById('adminPassInput').value = "";
        }
    }

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyB3qk4sGyqcbVX-OPG1ngEmgwmN83YYOcK",
        databaseURL: "https://belgo-menu-b2-default-rtdb.firebaseio.com",
        projectId: "belgo-menu-b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const IMGBB_API = "53133c0e06337943f4b4f460d1805e01";

    // --- DATA LOADING ---
    function loadData() {
        // Load Trending
        db.ref('popular').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('trending-items-display');
            container.innerHTML = '<b>Active in Slider:</b>';
            for(let key in data) {
                container.innerHTML += `
                    <div class="item-row">
                        <div style="display:flex; align-items:center; gap:10px">
                            <img src="${data[key].i}" class="item-img">
                            <span style="font-size:0.85rem">${data[key].n}</span>
                        </div>
                        <button class="btn-red" onclick="deleteItem('popular', '${key}')">Remove</button>
                    </div>`;
            }
        });

        // Load Menu
        db.ref('menu').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('menu-items-display');
            container.innerHTML = '';
            for(let cat in data) {
                container.innerHTML += `<div class="cat-tag">${cat.replace(/^\d+_/, '')}</div>`;
                for(let key in data[cat]) {
                    container.innerHTML += `
                        <div class="item-row">
                            <div style="display:flex; align-items:center; gap:10px">
                                <img src="${data[cat][key].i}" class="item-img">
                                <span style="font-size:0.85rem">${data[cat][key].n} (₹${data[cat][key].p.toLocaleString()})</span>
                            </div>
                            <button class="btn-red" onclick="deleteItem('menu/${cat}', '${key}')">Delete</button>
                        </div>`;
                }
            }
        });
    }

    // --- UPLOAD ACTIONS ---
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: "POST", body: formData });
        const result = await res.json();
        return result.data.url;
    }

    async function uploadLogo() {
        const file = document.getElementById('logoFile').files[0];
        if(!file) return alert("Select a logo image!");
        document.getElementById('logoStatus').style.display = 'block';
        try {
            const url = await uploadToImgBB(file);
            await db.ref('settings/logo').set(url);
            alert("Logo Updated!");
            location.reload();
        } catch(e) { alert("Logo upload failed!"); }
    }

    async function addItem(type) {
        const isPop = type === 'popular';
        const name = document.getElementById(isPop ? 'trendName' : 'itemName').value;
        const price = document.getElementById(isPop ? 'trendPrice' : 'itemPrice').value;
        const file = document.getElementById(isPop ? 'trendFile' : 'itemFile').files[0];
        const cat = isPop ? '' : document.getElementById('itemCat').value;

        if(!name || !price || !file || (!isPop && !cat)) return alert("Please fill all fields!");

        document.getElementById(isPop ? 'trendStatus' : 'itemStatus').style.display = 'block';
        try {
            const url = await uploadToImgBB(file);
            const path = isPop ? 'popular' : 'menu/' + cat;
            await db.ref(path).push({ n: name, p: parseInt(price), i: url });
            alert("Success!");
            location.reload();
        } catch(e) { alert("Upload error!"); }
    }

    function deleteItem(path, id) {
        if(confirm("Confirm deletion?")) db.ref(path + '/' + id).remove();
    }

    loadData();
</script>
</body>
</html>
