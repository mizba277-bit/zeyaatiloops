<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeyaati Loops | Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --cream-bg: #fffcf5;
            --white: #ffffff;
            --gold-accent: #bf9b30;
            --gold-dark: #8c6f1f;
            --text-dark: #1a1a1a;
            --body-font: 'Inter', sans-serif;
            --display-font: 'Playfair Display', serif;
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --premium-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; }
        body {
            font-family: var(--body-font);
            background-color: var(--cream-bg);
            margin: 0;
            padding-bottom: 120px;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Header & Logo --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-wrapper {
            width: 100%;
            max-width: 160px;
            min-height: 50px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            max-width: 100%;
            max-height: 70px;
            object-fit: contain;
        }

        /* --- Trending Slider --- */
        .trending-section {
            background-color: var(--white);
            padding: 30px 0;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .section-title {
            font-family: var(--display-font);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: var(--gold-dark);
            letter-spacing: 1px;
        }
        .trending-track {
            display: flex;
            width: max-content;
            animation: slide 35s linear infinite;
        }
        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .trending-card {
            width: 190px;
            margin: 15px 12px;
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            animation: float 4s ease-in-out infinite;
            transition: 0.3s;
            border: 1px solid #f9f9f9;
        }
        .trending-card:nth-child(even) { animation-delay: 1.5s; }
        .trending-img { width: 100%; height: 180px; object-fit: cover; }
        .trending-info { padding: 12px; text-align: center; }
        .trending-info h4 { font-size: 0.85rem; margin: 0; color: #333; }
        .trending-info span { color: var(--gold-accent); font-weight: 700; font-size: 0.95rem; }

        /* --- Search Bar --- */
        .search-container { padding: 0 20px; max-width: 600px; margin: 0 auto 30px auto; }
        .search-bar {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 1px solid rgba(191, 155, 48, 0.2); outline: none;
            background: white; text-align: center;
            box-shadow: var(--shadow-sm);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-bar:focus { transform: scale(1.03); box-shadow: var(--premium-shadow); border-color: var(--gold-accent); }

        /* --- Main Grid & Cards --- */
        #main-container { max-width: 1100px; margin: 0 auto; padding: 0 15px; }
        .category-title { 
            font-family: var(--display-font); font-size: 1.4rem; margin: 40px 0 20px; 
            border-bottom: 2px solid var(--gold-accent); display: inline-block; padding-bottom: 5px;
        }
        .product-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 20px; animation: fadeInUp 0.8s ease-out; 
        }
        .product-card { 
            background: var(--white); border-radius: 18px; overflow: hidden; 
            box-shadow: var(--shadow-sm); display: flex; flex-direction: column; 
            transition: all 0.4s ease;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--premium-shadow); }
        .img-zoom-container { overflow: hidden; width: 100%; height: 200px; }
        .product-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s ease; 
        }
        .product-card:hover .product-img { transform: scale(1.1); }
        
        .product-info { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; color: var(--text-dark); height: 40px; overflow: hidden; }
        .product-price { color: var(--gold-dark); font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; }
        
        .add-btn {
            background: linear-gradient(-45deg, #bf9b30, #8c6f1f, #d4af37, #bf9b30);
            background-size: 400% 400%; animation: gradientBG 6s ease infinite;
            color: white; border: none; width: 100%; padding: 12px; border-radius: 25px; 
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .add-btn:active { transform: scale(0.92); }

        /* --- Cart Float --- */
        .cart-float {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; color: white; padding: 16px 40px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
            z-index: 999; cursor: pointer; transition: 0.3s;
        }
        .cart-float:hover { transform: translateX(-50%) translateY(-5px); }
        .cart-count { background: var(--gold-accent); color: #000; padding: 2px 10px; border-radius: 10px; font-weight: 800; }

        /* --- Modal Styling --- */
        #cart-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: none; z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { 
            background: white; width: 100%; max-width: 420px; border-radius: 25px; 
            padding: 30px; position: relative; animation: fadeInUp 0.4s ease;
        }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .remove-icon { color: #ff4757; cursor: pointer; transition: 0.2s; }
        .remove-icon:hover { transform: scale(1.2); }
        .checkout-btn {
            background: #25D366; color: white; width: 100%; padding: 16px; border-radius: 15px; 
            border: none; font-weight: 700; margin-top: 25px; cursor: pointer; font-size: 1rem;
        }

        @media (max-width: 480px) { 
            .product-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .img-zoom-container { height: 160px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper" id="logoPlace"></div>
    <h1 class="shop-name">Elite Jewellery</h1>
</header>

<div class="trending-section" id="trendingSection" style="display:none;">
    <h2 class="section-title"><i class="fas fa-fire" style="color:#ff9f43"></i> Trending Styles</h2>
    <div class="trending-track" id="trendingTrack"></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="Search for your favorite designs..." onkeyup="searchMenu()">
</div>

<div id="main-container">
    <div id="menu-content"></div>
</div>

<div class="cart-float" onclick="toggleCart()">
    <i class="fas fa-shopping-bag"></i>
    <span style="font-weight:700; letter-spacing: 1px;">VIEW BAG</span>
    <span class="cart-count" id="cartCount">0</span>
</div>

<div id="cart-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="font-family:var(--display-font); margin-top:0; color:var(--gold-dark);">Your Selection</h2>
        <div id="cart-items-list" style="max-height: 350px; overflow-y: auto;"></div>
        <div style="margin-top:20px; border-top: 2px solid #f0f0f0; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size: 1.2rem;">
                <span>Total:</span>
                <span>₹<span id="total-price">0</span></span>
            </div>
            <button class="checkout-btn" onclick="sendWhatsAppOrder()">
                <i class="fab fa-whatsapp"></i> WhatsApp Enquiry
            </button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB3qk4sGyqcbVX-OPG1ngEmgwmN83YYOcK",
        databaseURL: "https://belgo-menu-b2-default-rtdb.firebaseio.com",
        projectId: "belgo-menu-b2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let fullMenuData = {};
    let cart = {};

    db.ref('menu').on('value', snap => {
        fullMenuData = snap.val() || {};
        renderMenu(fullMenuData);
    });

    db.ref('popular').on('value', snap => {
        const trendingData = snap.val();
        renderTrending(trendingData);
    });

    db.ref('settings/logo').on('value', snap => {
        if(snap.exists()){
            document.getElementById('logoPlace').innerHTML = `<img src="${snap.val()}" alt="Logo">`;
        }
    });

    function renderMenu(data) {
        const container = document.getElementById('menu-content');
        container.innerHTML = '';
        Object.keys(data).sort().forEach(cat => {
            let html = `<h3 class="category-title">${cat.replace(/^\d+_/, '')}</h3><div class="product-grid">`;
            Object.values(data[cat]).forEach(item => {
                html += `
                    <div class="product-card">
                        <div class="img-zoom-container">
                            <img src="${item.i}" class="product-img" loading="lazy">
                        </div>
                        <div class="product-info">
                            <div class="product-name">${item.n}</div>
                            <span class="product-price">₹${item.p.toLocaleString('en-IN')}</span>
                            <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">Add to Bag</button>
                        </div>
                    </div>`;
            });
            container.innerHTML += html + `</div>`;
        });
    }

    function renderTrending(data) {
        const section = document.getElementById('trendingSection');
        const track = document.getElementById('trendingTrack');
        if(!data) { section.style.display = 'none'; return; }
        
        section.style.display = 'block';
        track.innerHTML = '';
        let content = '';
        Object.values(data).forEach(item => {
            content += `
                <div class="trending-card" onclick="quickSearch('${item.n}')">
                    <img src="${item.i}" class="trending-img">
                    <div class="trending-info">
                        <h4>${item.n}</h4>
                        <span>₹${item.p.toLocaleString('en-IN')}</span>
                    </div>
                </div>`;
        });
        track.innerHTML = content + content; 
    }

    function addToCart(name, price) {
        if (cart[name]) cart[name].qty += 1;
        else cart[name] = { price, qty: 1 };
        updateUI();
    }

    function removeFromCart(name) {
        delete cart[name];
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-items-list');
        const count = Object.values(cart).reduce((s, i) => s + i.qty, 0);
        let total = 0;
        document.getElementById('cartCount').innerText = count;
        list.innerHTML = count === 0 ? '<p style="text-align:center; color:#aaa; padding:30px;">Your bag is empty.</p>' : '';
        
        for (const [name, item] of Object.entries(cart)) {
            total += item.price * item.qty;
            list.innerHTML += `
                <div class="cart-item">
                    <div>
                        <div style="font-weight:700; font-size:0.95rem;">${name}</div>
                        <div style="font-size:0.8rem; color:var(--gold-accent);">₹${item.price.toLocaleString()} x ${item.qty}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span style="font-weight:800; color:var(--gold-dark);">₹${(item.price * item.qty).toLocaleString()}</span>
                        <i class="fas fa-trash-alt remove-icon" onclick="removeFromCart('${name}')"></i>
                    </div>
                </div>`;
        }
        document.getElementById('total-price').innerText = total.toLocaleString('en-IN');
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function closeModal(e) { if(e.target.id === 'cart-modal') toggleCart(); }

    function quickSearch(term) {
        document.getElementById('searchInput').value = term;
        searchMenu();
        document.getElementById('main-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function searchMenu() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = {};
        Object.keys(fullMenuData).forEach(c => {
            const items = Object.values(fullMenuData[c]).filter(i => i.n.toLowerCase().includes(q));
            if(items.length) filtered[c] = items;
        });
        renderMenu(filtered);
    }

    function sendWhatsAppOrder() {
        if (Object.keys(cart).length === 0) return;
        const whatsappNumber = "919876543210"; // Update your number here
        let msg = "*Jewellery Enquiry - Elite Jewellery*%0A%0A";
        for (const [name, item] of Object.entries(cart)) {
            msg += `💍 *${name}*%0A   Qty: ${item.qty}%0A   Rate: ₹${item.price.toLocaleString()}%0A%0A`;
        }
        msg += `*Total Estimate: ₹${document.getElementById('total-price').innerText}*`;
        window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
